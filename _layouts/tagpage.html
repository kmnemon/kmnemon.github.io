---
layout: default
---

{%- include header.html -%}

<!-- Main -->
<div id="main">
	<!-- Post -->
	<article class="shade-two">
		<div class="container">
			<header>

				<div class="post">
					<h2>{{ page.tag }}</h2>
					<ul>
						{% for post in site.tags[page.tag] %}
						<li><a href="{{ post.url }}">{{ post.title }}</a> ({{ post.date | date_to_string }})<br>
							{{ post.description }}
						</li>
						{% endfor %}
					</ul>
				</div>
				<hr>
				
			</header>
			{{- content -}}
		</div>
	</article>
</div>
